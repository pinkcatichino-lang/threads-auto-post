name: Threads 自動投稿（朝6時・昼12時・夜20時）

on:
  schedule:
    - cron: '0 21 * * *'   # 朝 6:00 JST (= UTC 前日21:00)
    - cron: '0 3 * * *'    # 昼 12:00 JST (= UTC 03:00)
    - cron: '0 11 * * *'   # 夜20:00 JST (= UTC 11:00)
  workflow_dispatch:
    inputs:
      slot:
        description: '投稿スロット (朝/昼/夜)'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install requests

      - name: スロット判定
        run: |
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            echo "SLOT=${{ github.event.inputs.slot }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 21 * * *" ]; then
            echo "SLOT=朝" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 3 * * *" ]; then
            echo "SLOT=昼" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 11 * * *" ]; then
            echo "SLOT=夜" >> $GITHUB_ENV
          fi

      - name: Threads に投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python threads_auto_post.py

      - name: 進捗を保存
        run: |
          git config user.email "bot@github.com"
          git config user.name "Threads Bot"
          git add progress.json
          git diff --staged --quiet || git commit -m "進捗更新"
          git push
